<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LeagueIQ Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="firebase.js"></script>
  </head>
  <body>
    <div id="app-container">
      <!-- =========================
     DYNAMIC HEADER CONTAINER
========================== -->
      <div id="header-container"></div>
      <!-- DASHBOARD HEADER is injected dynamically into #header-container -->
      <div id="search-overlay" class="search-overlay hidden">
        <div class="search-overlay-box">
          <input
            type="text"
            id="expanded-search"
            placeholder="Search any active player"
            autocomplete="off"
          />
          <div
            id="expanded-search-results"
            class="expanded-search-results"
          ></div>
        </div>
      </div>
      <main>
        <section id="dashboard-tab" class="tab-content active-content">
          <div class="card">
            <h2 id="team-title">Welcome To LeagueIQ</h2>
            <p id="team-analytics">
              Connect your first fantasy league to unlock analytics.
            </p>
          </div>
        </section>
      </main>
    </div>
    <script src="header-loader.js"></script>
