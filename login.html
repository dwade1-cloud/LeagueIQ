<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">
<title>LeagueIQ Login</title>
<link rel="stylesheet"
href="styles.css">
<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div id="auth-background">
    <img
    src="images/Galaxy.png"
    class="auth-background-image">
</div>
<section
id="login-screen"
class="screen">
    <div class="auth-brand">
        <div class="auth-logo">
    	    <span class="logo-league">
        	LEAGUE
    	    </span>
    	    <span class="logo-iq">
        	IQ
    	    </span>
	</div>
	<div class="auth-tagline">
    	    Fantasy Sports Intelligence
	</div>
    </div>
    <div class="card">
	<h1 class="auth-title">
            Welcome Back
        </h1>
        <p class="auth-subtitle">
            Log in to access your dashboard
        </p>
        <div class="input-group">
    	    <label>Email</label>
    	    <div class="input-wrapper">
        	<span class="input-icon">
            	    <i class="fa-regular fa-envelope"></i>
        	</span>
        	<input
        	type="email"
        	id="login-email"
		spellcheck="false"
        	placeholder="Enter your email"
		autocapitalize="off"
		autocorrect="off">
    	    </div>
	</div>
        <div class="input-group">
    	    <label>Password</label>
    	    <div class="input-wrapper">
        	<span class="input-icon">
            	    <i class="fa-solid fa-lock"></i>
        	</span>
        	<input
        	type="password"
        	id="login-password"
        	placeholder="Enter your password">
        	<span
        	class="toggle-password"
        	id="toggle-password">
                    <i class="fa-regular fa-eye"></i>
        	</span>
    	    </div>
	</div>
	<div class="login-options">
    	    <label class="remember-me">
        	<input
        	type="checkbox"
        	id="remember-me">
        	<span>
            	    Remember Me
        	</span>
    	    </label>
    	    <button
    	    type="button"
    	    id="forgot-password-btn"
    	    class="forgot-password-btn">
        	Forgot Password?
    	    </button>
	</div>
        <button id="login-btn">
            Log In
        </button>
        <div class="divider">
    	    <span class="divider-line"></span>
    	    <span class="divider-text">
        	OR
    	    </span>
    	    <span class="divider-line"></span>
	</div>
	<div
	id="login-error"
	class="auth-error hidden">
	    Invalid email or password.
	</div>
	<button
	type="button"
	id="google-login-btn"
	class="google-btn">
    	    <i class="fa-brands fa-google"></i>
    	    Continue with Google
	</button>
    </div>
    <div class="auth-footer">
    	<button
    	id="back-home-btn"
    	class="auth-link-btn">
            ← Back To Homepage
    	</button>
    	<div class="footer-divider">
            <span class="footer-line"></span>
            <span class="footer-divider-text">
            	OR
            </span>
            <span class="footer-line"></span>
    	</div>
    	<button
    	id="signup-instead-btn"
    	class="auth-link-btn">
            Sign Up Instead →
    	</button>
    </div>
</section>
<script src=
"https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js">
</script>
<script src=
"https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js">
</script>
<script src=
"https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js">
</script>
<script src="firebase.js"></script>
<script>
auth.onAuthStateChanged(
    user => {
        if(user){
            window.location.href =
            "dashboard.html";}}
);
document.getElementById(
    "signup-instead-btn"
).addEventListener(
    "click",
    () => {
        window.location.href =
        "signup.html";}
);
document.getElementById(
    "back-home-btn"
).addEventListener(
    "click",
    () => {
        window.location.href =
        "index.html"}
);
// PASSWORD VISIBILITY TOGGLE
const passwordInput =
document.getElementById(
    "login-password");
const togglePassword =
document.getElementById(
    "toggle-password");
togglePassword.addEventListener(
    "click",
    () => {
        if(
            passwordInput.type ===
            "password"){
            passwordInput.type =
            "text";
        }else{
            passwordInput.type =
            "password";}}
);
// LOGIN ====================================
const loginBtn =
document.getElementById(
    "login-btn");
const loginEmail =
document.getElementById(
    "login-email");
const loginPassword =
document.getElementById(
    "login-password");
const loginError =
document.getElementById(
    "login-error");
loginBtn.addEventListener(
    "click",
    () => {
        const email =
        loginEmail.value.trim();
        const password =
        loginPassword.value;
        auth.signInWithEmailAndPassword(
            email,
            password)
        .then(
            () => {
                loginError.classList.add(
                    "hidden");
                window.location.href =
                "dashboard.html";})
        .catch(
            error => {
                console.error(
                    error);
                loginError.classList.remove(
                    "hidden");});}
);
</script>
</body>
</html>
