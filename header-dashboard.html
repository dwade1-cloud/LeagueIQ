<!-- =========================
     DASHBOARD
========================== -->
      <header id="dashboard-header" class="public-header">
        <div class="public-header-left">
          <div class="brand-container">
            <div class="public-logo">
              <span class="logo-league"> LEAGUE </span>

              <span class="logo-iq"> IQ </span>
            </div>

            <div class="logo-subtitle">Fantasy Sports Intelligence</div>
          </div>

          <div class="custom-dropdown" id="league-dropdown">
            <button id="league-selected" class="dropdown-selected">
              <span id="selected-league"> Fantasy League </span>

              <span class="dropdown-arrow"> ▼ </span>
            </button>

            <div id="league-options" class="dropdown-options">
              <button class="dropdown-option">League 1</button>

              <button class="dropdown-option">League 2</button>
            </div>
          </div>

          <button
            id="dashboard-home-btn"
            class="hidden">
            ← Dashboard
          </button>

          <nav class="public-nav">
            <button class="nav-btn" id="nav-rankings">Rankings</button>

            <button class="nav-btn" id="nav-trending">Trending</button>

            <button class="nav-btn" id="nav-trade">Trade Calculator</button>

            <div class="more-dropdown" id="more-dropdown">
              <button class="nav-btn" id="more-btn">
                More

                <span class="more-arrow"> ▼ </span>
              </button>
              <div class="more-dropdown-menu" id="more-dropdown-menu">
                <button id="nav-injuries" class="more-option">Injuries</button>
                <button id="nav-waiver" class="more-option">
                  Waiver Wire Insight
                </button>
                <button id="nav-buylow" class="more-option">
                  Buy Low / Sell High
                </button>
                <button id="nav-boombust" class="more-option">
                  Boom / Bust
                </button>
                <button id="nav-teamstats" class="more-option">
                  Team Stats
                </button>
                <button id="more-rankings" class="more-option">Rankings</button>
                <button id="more-trending" class="more-option">Trending</button>
                <button id="more-trade" class="more-option">
                  Trade Calculator
                </button>
              </div>
            </div>
          </nav>
        </div>

        <div class="public-header-right">
          <button id="mobile-search-btn" class="mobile-search-btn">🔍</button>

          <div id="plan-badge">FREE PLAN</div>

          <button id="profile-btn" class="public-auth-btn">Profile</button>

          <button id="logout-btn">Logout</button>
        </div>
      </header>
